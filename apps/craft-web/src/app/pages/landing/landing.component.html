<div class="landing-page" [ngClass]="currentTheme">
  <!-- Particle animation background -->
  <div #particleContainer class="particle-container"></div>
  
  <!-- Hero section -->
  <section class="hero-section">
    <div class="hero-content">
      <h1 class="hero-title" @fadeIn>CRAFT FUSION</h1>
      <div class="hero-subtitle" @slideIn>Powerful tools with a patriotic spirit</div>
      
      <div class="hero-cta-container" @slideIn>
        <button mat-raised-button color="primary" class="hero-cta" (click)="navigateTo('/dashboard')">
          <mat-icon>arrow_forward</mat-icon>
          Get Started
        </button>
        
        <button mat-stroked-button class="hero-cta secondary" (click)="navigateTo('/about')">
          Learn More
        </button>
      </div>
    </div>
  </section>
  
  <!-- Features section -->
  <section class="features-section" @scaleIn>
    <h2 class="section-title">Our Features</h2>
    
    <div class="features-grid">
      <div class="feature-card" *ngFor="let feature of features; let i = index" 
           [@stagger]="getAnimationDelay(i)">
        <mat-icon class="feature-icon">{{feature.icon}}</mat-icon>
        <h3 class="feature-title">{{feature.title}}</h3>
        <p class="feature-description">{{feature.description}}</p>
      </div>
    </div>
  </section>
  
  <!-- Call to action section -->
  <section class="cta-section" @scaleIn>
    <div class="cta-content">
      <h2 class="cta-title">Ready to get started?</h2>
      <p class="cta-subtitle">Join thousands of organizations using Craft Fusion today.</p>
      
      <button mat-raised-button color="accent" class="cta-button" (click)="navigateTo('/register')">
        Create Account
      </button>
    </div>
  </section>
</div>
