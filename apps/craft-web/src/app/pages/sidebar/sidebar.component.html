<div class="sidebar-container" 
     [class.collapsed]="collapsed"
     [class.mobile]="isMobile"
     [class.resizing]="resizing"
     [style.width.px]="collapsed ? 64 : currentWidth"
     (mouseenter)="onMouseEnter()" 
     (mouseleave)="onMouseLeave()">
     
  <!-- Sidebar header with logo -->
  <div class="sidebar-header">
    <div class="logo-container">
      <img src="assets/images/logo.svg" alt="Craft Fusion Logo" class="logo" *ngIf="!collapsed" />
      <img src="assets/images/icon.svg" alt="Craft Fusion Icon" class="icon" *ngIf="collapsed" />
    </div>
    <button mat-icon-button class="collapse-button" (click)="toggleSidebar()" aria-label="Toggle sidebar">
      <mat-icon>{{ collapsed ? 'chevron_right' : 'chevron_left' }}</mat-icon>
    </button>
  </div>
  
  <!-- Sidebar content -->
  <div class="sidebar-content">
    <nav class="sidebar-nav">
      <ul class="nav-list">
        <!-- Regular navigation items -->
        <li *ngFor="let item of navItems" class="nav-item" [class.has-children]="!!item.children">
          <!-- Parent items with no children -->
          <a *ngIf="!item.children" 
             [routerLink]="item.route" 
             routerLinkActive="active"
             [class.active]="isActive(item.route)" 
             class="nav-link">
            <mat-icon class="nav-icon">{{item.icon}}</mat-icon>
            <span class="nav-text" *ngIf="!collapsed">{{item.text}}</span>
          </a>
          
          <!-- Parent items with children (expandable) -->
          <div *ngIf="item.children" 
               class="nav-parent"
               [class.expanded]="item.expanded"
               [class.active]="isChildActive(item)">
            <div class="nav-parent-header" (click)="toggleExpand(item)">
              <mat-icon class="nav-icon">{{item.icon}}</mat-icon>
              <span class="nav-text" *ngIf="!collapsed">{{item.text}}</span>
              <mat-icon class="expand-icon" *ngIf="!collapsed">
                {{item.expanded ? 'expand_less' : 'expand_more'}}
              </mat-icon>
            </div>
            
            <!-- Child items (projects) -->
            <ul class="nav-children" [class.expanded]="item.expanded" *ngIf="!collapsed || (collapsed && item.expanded)">
              <li *ngFor="let child of item.children" class="nav-child-item">
                <a [routerLink]="child.route" 
                   routerLinkActive="active"
                   [class.active]="isActive(child.route)" 
                   class="nav-link child-link">
                  <mat-icon class="nav-icon">{{child.icon}}</mat-icon>
                  <span class="nav-text" *ngIf="!collapsed">{{child.text}}</span>
                </a>
              </li>
            </ul>
          </div>
        </li>
      </ul>
    </nav>
  </div>
  
  <!-- Sidebar footer -->
  <div class="sidebar-footer">
    <button mat-icon-button aria-label="Settings">
      <mat-icon>settings</mat-icon>
    </button>
    <button mat-icon-button aria-label="Account">
      <mat-icon>account_circle</mat-icon>
    </button>
  </div>
  
  <!-- Resize handle -->
  <div class="resize-handle" 
       *ngIf="!collapsed && !isMobile" 
       (mousedown)="startResize($event)">
  </div>
</div>
