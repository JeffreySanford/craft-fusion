<div class="sidebar-container" [class.collapsed]="isCollapsed">
  <div class="sidebar-menu-container">
    <div class="menu-group">
      <button mat-button *ngFor="let item of menuItems"
              class="menu-item"
              [class.active]="item.active"
              [class.admin-button]="item.isAdminFeature"
              [routerLink]="item.route"
              routerLinkActive="active">
        <mat-icon>{{ item.icon }}</mat-icon>
        <span class="menu-text" *ngIf="!isCollapsed">{{ item.label }}</span>
        <span class="admin-badge" *ngIf="item.isAdminFeature && !isCollapsed">ADMIN</span>
      </button>
    </div>
  </div>
  
  <button mat-icon-button class="toggle" (click)="toggleCollapse()">
    <mat-icon>{{ isCollapsed ? 'chevron_right' : 'chevron_left' }}</mat-icon>
  </button>
</div>
