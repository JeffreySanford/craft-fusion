<div class="settings-container" [ngClass]="currentTheme">
  <div class="settings-header">
    <h2 class="patriotic-gradient-text">Application Settings</h2>
    <p class="header-subtitle">Configure your personalization options</p>
  </div>
  
  <div class="settings-content">
    <!-- Navigation tabs using Material Design tabs -->
    <div class="settings-nav">
      <nav mat-tab-nav-bar [tabPanel]="tabPanel" class="no-flicker-tabs">
        <a mat-tab-link
           *ngFor="let link of navLinks"
           [routerLink]="link.path"
           routerLinkActive #rla="routerLinkActive"
           [active]="rla.isActive"
           class="tab-link">
          <mat-icon>{{link.icon}}</mat-icon>
          <span class="link-text">{{link.label}}</span>
        </a>
      </nav>
      <mat-tab-nav-panel #tabPanel></mat-tab-nav-panel>
    </div>
    
    <!-- Content area with router outlet -->
    <div class="settings-view mat-elevation-z1">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
