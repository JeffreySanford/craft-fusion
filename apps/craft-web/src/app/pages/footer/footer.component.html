<footer class="footer" [@expandFooter]="footerState" (click)="toggleFooter($event)">
  <div class="footer-header">
    <div class="footer-toggle-indicator">
      <mat-icon>{{ isExpanded ? 'keyboard_arrow_down' : 'keyboard_arrow_up' }}</mat-icon>
      <span class="footer-toggle-text">{{ isExpanded ? 'Collapse' : 'Expand' }} Footer</span>
    </div>
  </div>
  
  <div class="footer-content">
    <!-- This content will be shown/hidden based on the expanded state -->
    <div class="footer-sections">
      <div class="footer-section" *ngFor="let section of footerLinks">
        <h4>{{ section.category }}</h4>
        <ul>
          <li *ngFor="let link of section.links">
            <a [routerLink]="link.url">{{ link.title }}</a>
          </li>
        </ul>
      </div>
    </div>
    
    <div class="footer-bottom">
      <div class="copyright">
        © {{ currentYear }} Craft Fusion. All rights reserved.
      </div>
      <div class="social-links">
        <a *ngFor="let social of socialLinks" 
           [href]="social.url" 
           target="_blank" 
           [attr.aria-label]="social.label">
          <mat-icon>{{ social.icon }}</mat-icon>
        </a>
      </div>
    </div>
  </div>
</footer>
