<footer class="footer" [class.expanded]="isExpanded" [ngClass]="currentTheme">
  <!-- Collapsed Footer Section -->
  <div class="footer-content">
    <div class="footer-branding">
      <div class="star-container">
        <i class="material-icons animated-star">star</i>
      </div>
      <span class="branding-text">Jeffrey Sanford</span>
    </div>
    
    <div class="footer-center">
      <span>&copy; 2025 Craft Fusion</span>
    </div>
    
    <button mat-icon-button (click)="toggleExpand()" aria-label="Toggle Footer" class="expand-toggle">
      <mat-icon>{{ isExpanded ? 'expand_more' : 'expand_less' }}</mat-icon>
    </button>
  </div>
  
  <!-- Expanded Footer Section -->
  <div class="footer-expanded" *ngIf="isExpanded">
    <!-- Row 1: Contact and Logo Containers -->
    <div class="expanded-row logos-row">
      <!-- Contact Container -->
      <div class="contact-container">
        <h3>Contact Us</h3>
        <div class="contact-info">
          <p><mat-icon>email</mat-icon> info&#64;example.com</p>
          <p><mat-icon>phone</mat-icon> (555) 123-4567</p>
          <p><mat-icon>location_on</mat-icon> Washington, D.C.</p>
        </div>
      </div>
      
      <!-- Industry Logos Container -->
      <div class="logos-container industry-logos">
        <h3>Industry Partners</h3>
        <div class="logos-grid">
          <div *ngFor="let logo of industryLogos" class="logo-item" (click)="navigateToPartnerSite(logo)">
            <img [src]="logo.imageUrl" [alt]="logo.name" class="partner-logo">
            <span class="logo-name">{{ logo.name }}</span>
          </div>
        </div>
      </div>
      
      <!-- Federal Agencies Logos Container -->
      <div class="logos-container federal-logos">
        <h3>Federal Agencies</h3>
        <div class="logos-grid">
          <div *ngFor="let logo of federalLogos" class="logo-item" (click)="navigateToPartnerSite(logo)">
            <img [src]="logo.imageUrl" [alt]="logo.name" class="partner-logo">
            <span class="logo-name">{{ logo.name }}</span>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Row 2: Full-width Graph -->
    <div class="expanded-row graph-row">
      <div class="graph-container">
        <h3>Performance Metrics</h3>
        <app-line-chart [data]="performanceData" [options]="chartOptions"></app-line-chart>
      </div>
    </div>
  </div>
</footer>
