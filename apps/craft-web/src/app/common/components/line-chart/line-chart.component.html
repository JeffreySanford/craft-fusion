<div class="chart-container" [ngClass]="{'loading': loading, 'error': error}">
  <div *ngIf="loading" class="chart-loader">
    <mat-spinner diameter="40"></mat-spinner>
  </div>
  
  <div *ngIf="error" class="chart-error">
    <mat-icon color="warn">error_outline</mat-icon>
    <p>{{ errorMessage || 'Failed to load chart data' }}</p>
  </div>
  
  <canvas #chartCanvas></canvas>
  
  <div class="chart-legend" *ngIf="showLegend && data?.length">
    <div *ngFor="let item of data" class="legend-item">
      <div class="legend-color" [style.backgroundColor]="item.color || generateColor(item.label)"></div>
      <span class="legend-label">{{ item.label }}</span>
    </div>
  </div>
</div>
