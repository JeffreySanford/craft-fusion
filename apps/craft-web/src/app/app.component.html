<div class="app-container" [ngClass]="{
  'footer-expanded': (layoutService.footerExpanded$ | async)
}">
  <!-- Header -->
  <app-header *ngIf="layoutService.headerVisible$ | async"></app-header>
  
  <!-- Main Content Area -->
  <div class="content-container">
    <!-- Sidebar -->
    <app-sidebar 
      *ngIf="layoutService.sidebarVisible$ | async"
      [style.height]="sidebarHeight">
    </app-sidebar>
    
    <!-- Gutter between sidebar and main content -->
    <div class="gutter" *ngIf="layoutService.sidebarVisible$ | async"></div>
    
    <!-- Mainstage -->
    <div class="mainstage" [style.height]="mainstageHeight">
      <router-outlet></router-outlet>
    </div>
  </div>
  
  <!-- Footer -->
  <app-footer *ngIf="layoutService.footerVisible$ | async"></app-footer>
</div>
