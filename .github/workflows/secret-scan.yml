name: Secret Scan (gitleaks)

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches: [ main ]
  workflow_dispatch: {}
  schedule:
    # Timezone: UTC. Intent: weekly secret scan (gitleaks + trufflehog).
    - cron: '0 12 * * 0' # weekly on Sunday at 12:00 UTC (UTC)

jobs:
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks scan
        uses: zricethezav/gitleaks-action@v2
        with:
          args: '--path=./ --report-format=json --report-path=gitleaks-report.json --redact'

      - name: Upload gitleaks report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json

      - name: Run TruffleHog scan (non-interactive)
        run: |
          echo "Running trufflehog..."
          npx trufflehog@latest filesystem . --json --verbose > trufflehog-report.json || echo "trufflehog failed with exit code $?"

      - name: Upload trufflehog report
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-report
          path: trufflehog-report.json
